services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopai-backend
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./products.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/products.db:/app/products.db
    depends_on:
      - redis
    networks:
      - shopai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: shopai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - shopai-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: shopai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shopai-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: shopai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - shopai-network
    restart: unless-stopped
    profiles:
      - production

networks:
  shopai-network:
    driver: bridge

volumes:
  redis-data:
