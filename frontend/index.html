<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>E-commerce Shopping Agent</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>

  <body>
    <header>
      <h1><i class="fa-solid fa-cart-shopping"></i> Shopping Agent</h1>
      <nav>
        <ul>
          <li>
            <a href="#"><i class="fa-solid fa-home"></i> Home</a>
          </li>
          <li>
            <a href="./pages/chat.html"><i class="fa-solid fa-comment-dots"></i> Chat</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="products-header">
        <h2>All Products</h2>
        <button class="btn" id="addProductBtn">
          <i class="fa-solid fa-plus"></i> Add Product
        </button>
      </div>

      <section id="productList" class="product-list">
        <p>Loading products...</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 Shopping Agent App. All rights reserved.</p>
    </footer>

    <div id="productModal" class="modal">
      <div class="modal-content">
        <h3 id="modalTitle">Add New Product</h3>
        <form id="productForm">
          <div class="form-group" style="display: none;">
            <label for="id">ID</label>
            <input type="text" id="id" name="id" />
          </div>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="categoryId">Category ID</label>
            <input type="text" id="categoryId" name="categoryId" required />
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label for="price">Price</label>
            <input type="number" id="price" name="price" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="ratings">Ratings (0.0 - 5.0)</label>
            <input type="number" id="ratings" name="ratings" step="0.1" min="0" max="5" required />
          </div>
          <div class="form-group">
            <label for="reviews">Number of Reviews</label>
            <input type="number" id="reviews" name="reviews" min="0" required />
          </div>
          <div class="form-group">
            <label for="image">Image URL</label>
            <input type="url" id="image" name="image" required />
          </div>
          <div class="form-group">
            <label for="badge">Badge Text (e.g., 'New', 'Sale')</label>
            <input type="text" id="badge" name="badge" />
          </div>

          <button type="submit" class="btn">Save Product</button>
          <button type="button" class="btn" id="closeModalBtn">Cancel</button>
        </form>
      </div>
    </div>

    <script type="module" src="./scripts/main.js"></script>
    <script type="module" src="./services/apiService.js"></script>
  </body>
</html>
