<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>E-commerce Shopping Agent</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>

  <body>
    <header>
      <h1><i class="fa-solid fa-cart-shopping"></i> Shopping Agent</h1>
      <nav>
        <ul>
          <li>
            <a href="#"><i class="fa-solid fa-home"></i> Home</a>
          </li>
          <li>
            <a href="./pages/chat.html"><i class="fa-solid fa-headset"></i> Customer Service</a>
          </li>
          <li>
            <a href="#" id="cartBtn"><i class="fa-solid fa-shopping-cart"></i> Cart <span id="cartCount" class="cart-badge">0</span></a>
          </li>
          <li>
            <a href="#" id="ordersBtn"><i class="fa-solid fa-box"></i> My Orders</a>
          </li>
          <li>
            <a href="#" id="compareBtn"><i class="fa-solid fa-code-compare"></i> Compare (<span id="compareCount">0</span>)</a>
          </li>
          <li>
            <a href="#" id="analyticsBtn"><i class="fa-solid fa-chart-line"></i> Analytics</a>
          </li>
          <li>
            <button class="btn-dark-mode" id="darkModeToggle" title="Toggle Dark Mode">
              <i class="fa-solid fa-moon"></i>
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <div class="keyboard-shortcuts-hint" id="shortcutsHint">
      Press <kbd>?</kbd> for shortcuts
    </div>

    <main>
      <div class="products-header">
        <h2>All Products</h2>
        <button class="btn" id="addProductBtn">
          <i class="fa-solid fa-plus"></i> Add Product
        </button>
      </div>

      <div class="voice-search-container">
        <button class="btn-voice" id="voiceSearchBtn">
          <i class="fa-solid fa-microphone"></i>
          <span>Voice Search</span>
        </button>
        <span class="voice-status" id="voiceStatus"></span>
      </div>

      <div class="filter-section">
        <div class="filter-group">
          <label><i class="fa-solid fa-filter"></i> Category:</label>
          <select id="categoryFilter">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="filter-group">
          <label><i class="fa-solid fa-dollar-sign"></i> Price:</label>
          <select id="priceFilter">
            <option value="">All Prices</option>
            <option value="0-50">Under $50</option>
            <option value="50-100">$50 - $100</option>
            <option value="100-500">$100 - $500</option>
            <option value="500+">$500+</option>
          </select>
        </div>
        <div class="filter-group">
          <label><i class="fa-solid fa-tag"></i> Badge:</label>
          <select id="badgeFilter">
            <option value="">All Badges</option>
          </select>
        </div>
        <button class="btn btn-filter" id="applyFilters">
          <i class="fa-solid fa-check"></i> Apply Filters
        </button>
        <button class="btn btn-reset" id="resetFilters">
          <i class="fa-solid fa-rotate-right"></i> Reset
        </button>
      </div>

      <div class="live-activity" id="liveActivity"></div>

      <section id="productList" class="product-list">
        <p>Loading products...</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 Shopping Agent App. All rights reserved.</p>
    </footer>

    <div id="productModal" class="modal">
      <div class="modal-content">
        <h3 id="modalTitle">Add New Product</h3>
        <form id="productForm">
          <div class="form-group" style="display: none;">
            <label for="id">ID</label>
            <input type="text" id="id" name="id" />
          </div>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="categoryId">Category ID</label>
            <input type="text" id="categoryId" name="categoryId" required />
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label for="price">Price</label>
            <input type="number" id="price" name="price" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="ratings">Ratings (0.0 - 5.0)</label>
            <input type="number" id="ratings" name="ratings" step="0.1" min="0" max="5" required />
          </div>
          <div class="form-group">
            <label for="reviews">Number of Reviews</label>
            <input type="number" id="reviews" name="reviews" min="0" required />
          </div>
          <div class="form-group">
            <label for="image">Image URL</label>
            <input type="url" id="image" name="image" required />
          </div>
          <div class="form-group">
            <label for="badge">Badge Text (e.g., 'New', 'Sale')</label>
            <input type="text" id="badge" name="badge" />
          </div>

          <button type="submit" class="btn">Save Product</button>
          <button type="button" class="btn" id="closeModalBtn">Cancel</button>
        </form>
      </div>
    </div>

    <script type="module" src="./scripts/main.js"></script>
    <script type="module" src="./services/apiService.js"></script>
  </body>
</html>
